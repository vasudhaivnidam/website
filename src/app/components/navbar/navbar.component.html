<nav [class]="'fixed w-full z-50 transition-all duration-300 ' + (isScrolled ? 'bg-white shadow-lg' : 'bg-transparent')">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-16">

      <!-- Logo -->
      <a routerLink="/" class="flex items-center gap-3" (click)="closeMenu()">
        <div class="w-12 h-12 rounded-full p-1 bg-white flex items-center justify-center text-white font-bold text-lg">
          <img src="logo-1.png" alt="logo">
        </div>
        <div class="leading-tight">
          <div [class]="'font-bold text-sm transition-colors ' + (isScrolled ? 'text-orange-700' : 'text-white')">
            Vasudhaivnidam
          </div>
          <div [class]="'text-xs transition-colors ' + (isScrolled ? 'text-gray-500' : 'text-orange-200')">Foundation</div>
        </div>
      </a>

      <!-- Desktop Nav -->
      <div class="hidden md:flex items-center gap-1">
        @for (link of navLinks; track link.path) {
          <a
            [routerLink]="link.path"
            routerLinkActive="!text-orange-500 font-semibold"
            [class]="'px-3 py-2 rounded-lg text-sm font-medium transition-colors hover:text-orange-400 ' + (isScrolled ? 'text-gray-700' : 'text-white')">
            {{ link.label }}
          </a>
        }
        <a
          routerLink="/donate"
          class="ml-3 bg-orange-600 hover:bg-orange-700 text-white px-5 py-2 rounded-full text-sm font-semibold transition-colors shadow-md">
          Donate Now
        </a>
      </div>

      <!-- Mobile menu button -->
      <button
        (click)="toggleMenu()"
        [class]="'md:hidden p-2 rounded-md transition-colors ' + (isScrolled ? 'text-gray-700' : 'text-white')">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          @if (!isMenuOpen) {
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
          } @else {
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          }
        </svg>
      </button>
    </div>
  </div>

  <!-- Mobile Menu -->
  @if (isMenuOpen) {
    <div class="md:hidden bg-white shadow-xl border-t border-orange-100">
      <div class="px-4 py-4 flex flex-col gap-1">
        @for (link of navLinks; track link.path) {
          <a
            [routerLink]="link.path"
            routerLinkActive="bg-orange-50 text-orange-600 font-semibold"
            (click)="closeMenu()"
            class="text-gray-700 font-medium px-3 py-2.5 rounded-lg hover:bg-orange-50 hover:text-orange-600 transition-colors">
            {{ link.label }}
          </a>
        }
        <a
          routerLink="/donate"
          (click)="closeMenu()"
          class="bg-orange-600 text-white px-4 py-2.5 rounded-full text-sm font-semibold text-center mt-2">
          Donate Now ❤️
        </a>
      </div>
    </div>
  }
</nav>
